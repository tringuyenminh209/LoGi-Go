name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Lint and test each Go service
        run: |
          for dir in services/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "=== Testing $dir ==="
              cd "$dir"
              go mod tidy
              go vet ./...
              go test ./... -race -timeout 60s || true
              cd -
            fi
          done

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install and build mobile
        run: cd apps/mobile && npm install --legacy-peer-deps && npm run build
      - name: Install and build web
        run: cd apps/web && npm install --legacy-peer-deps && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-lint-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build all Docker images
        run: |
          for dir in services/*/; do
            if [ -f "$dir/Dockerfile" ]; then
              echo "=== Building $dir ==="
              docker build -t "logi-go/$(basename $dir)" "$dir"
            fi
          done
